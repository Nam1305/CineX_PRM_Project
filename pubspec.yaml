name: cinex_application
description: "CineX — Screenplay & Scene Management for Independent Films"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.4

  # State Management
  provider: ^6.1.2

  # Image
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

